version: 1
name: default

judge:
  executor: claude-code
  model: opus
  prompt_file: prompts/judge.md
  timeout: 300s

experts:
  - name: independent
    executor: claude-code
    model: sonnet
    prompt_file: prompts/independent.md
    timeout: 180s
  - name: critic
    executor: claude-code
    model: sonnet
    prompt_file: prompts/critic.md
    timeout: 180s

quorum: 1
max_retries: 1
